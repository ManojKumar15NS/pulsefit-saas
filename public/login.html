<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainer Login - Pulse Trainer Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    /* Specific styles for Login Page */
    body {
      background: radial-gradient(circle at center, #1b2028 0%, #0a0c10 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .login-card {
      background: rgba(22, 26, 33, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 100px rgba(0, 243, 255, 0.03);
      text-align: center;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #00f3ff, #39ff14);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0b0f19;
      font-weight: bold;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #8892b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-card h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      margin: 0 0 8px 0;
      color: #ffffff;
    }

    .login-card p {
      font-size: 13.5px;
      color: #8892b0;
      margin: 0 0 24px 0;
    }

    /* Tabs toggle between Login / Signup */
    .login-tabs {
      display: flex;
      justify-content: space-around;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
    }

    .tab-btn {
      background: none;
      border: none;
      color: #8892b0;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 10px 0;
      cursor: pointer;
      width: 50%;
      position: relative;
      transition: color 0.2s ease;
    }

    .tab-btn:hover {
      color: #ffffff;
    }

    .tab-btn.active {
      color: #00f3ff;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: #00f3ff;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8892b0;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      background: rgba(10, 12, 16, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 14px 45px 14px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #ffffff;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: #00f3ff;
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.15), inset 0 0 5px rgba(0, 243, 255, 0.05);
      background: rgba(10, 12, 16, 0.8);
    }

    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #8892b0;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      transition: color 0.2s ease;
    }

    .toggle-password:hover {
      color: #00f3ff;
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #00f3ff, #00b4d8);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #0a0c10;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 243, 255, 0.2);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 243, 255, 0.35);
      background: linear-gradient(135deg, #00f3ff, #39ff14);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #ef4444;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13.5px;
      margin-bottom: 20px;
      display: none;
      animation: shake 0.4s ease-in-out;
      text-align: left;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">&#x26A1;</div>
        <div class="logo-text">PulseFit</div>
      </div>
      
      <!-- Login vs Register Tabs -->
      <div class="login-tabs">
        <button type="button" class="tab-btn active" id="tabLogin">Sign In</button>
        <button type="button" class="tab-btn" id="tabRegister">Sign Up</button>
      </div>

      <h2 id="formTitle">Trainer Login</h2>
      <p id="formSubtitle">Secure admin login to access client data</p>

      <div class="error-msg" id="errorMsg">Invalid credentials. Please try again.</div>

      <form id="loginForm">
        <!-- Full Name Group (Hidden initially, shown in Sign Up mode) -->
        <div class="input-group" id="fullNameGroup" style="display: none;">
          <label for="fullname">Full Name</label>
          <div class="input-wrapper">
            <input type="text" id="fullname" placeholder="Enter your full name">
          </div>
        </div>

        <!-- Username Group -->
        <div class="input-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" required placeholder="Enter username">
          </div>
        </div>

        <!-- Password Group -->
        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" required placeholder="Enter password">
            <button type="button" class="toggle-password" id="togglePassword">Show</button>
          </div>
        </div>

        <button type="submit" class="login-btn" id="btnSubmit">Secure Login</button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
