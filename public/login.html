<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PulseFit - Trainer Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --primary: #4CAF50;
      --primary-glow: rgba(76, 175, 80, 0.15);
      --bg-dark: #090d16;
      --bg-card: rgba(22, 28, 45, 0.6);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
    }

    body {
      background: radial-gradient(circle at center, #131a2e 0%, #070a13 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 80px rgba(76, 175, 80, 0.03);
      text-align: center;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), #81c784);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #070a13;
      font-weight: 700;
      font-size: 24px;
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-card h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      margin: 0 0 6px 0;
      font-weight: 700;
    }

    .login-card p {
      font-size: 13.5px;
      color: var(--text-secondary);
      margin: 0 0 24px 0;
      line-height: 1.5;
    }

    /* Tabs toggle between Login / Signup */
    .login-tabs {
      display: flex;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      position: relative;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      font-weight: 600;
      padding: 12px 0;
      cursor: pointer;
      width: 50%;
      position: relative;
      transition: color 0.2s ease;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--primary);
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--primary);
      box-shadow: 0 0 8px var(--primary);
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      background: rgba(10, 15, 30, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px 48px 12px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      color: var(--text-primary);
      box-sizing: border-box;
      transition: all 0.2s ease;
      min-height: 44px;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
      background: rgba(10, 15, 30, 0.8);
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 600;
      padding: 6px;
      transition: color 0.2s ease;
    }

    .toggle-password:hover {
      color: var(--primary);
    }

    .login-btn {
      width: 100%;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #070a13;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px var(--primary-glow);
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      background: #5cb860;
      box-shadow: 0 6px 16px rgba(76, 175, 80, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      animation: shake 0.4s ease-in-out;
      text-align: left;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">&#x26A1;</div>
        <div class="logo-text">PulseFit</div>
      </div>
      
      <!-- Login vs Register Tabs -->
      <div class="login-tabs">
        <button type="button" class="tab-btn active" id="tabLogin">Sign In</button>
        <button type="button" class="tab-btn" id="tabRegister">Sign Up</button>
      </div>

      <h2 id="formTitle">Trainer Login</h2>
      <p id="formSubtitle">Secure admin login to access client data</p>

      <div class="error-msg" id="errorMsg">Invalid credentials. Please try again.</div>

      <form id="loginForm">
        <!-- Full Name Group (Hidden initially, shown in Sign Up mode) -->
        <div class="input-group" id="fullNameGroup" style="display: none;">
          <label for="fullname">Full Name</label>
          <div class="input-wrapper">
            <input type="text" id="fullname" placeholder="Enter your full name">
          </div>
        </div>

        <!-- Username Group -->
        <div class="input-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" required placeholder="Enter username">
          </div>
        </div>

        <!-- Password Group -->
        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" required placeholder="Enter password">
            <button type="button" class="toggle-password" id="togglePassword">Show</button>
          </div>
        </div>

        <button type="submit" class="login-btn" id="btnSubmit">Secure Login</button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
